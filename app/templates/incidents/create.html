{% extends "base.html" %}
{% block title %}Create Incident{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="bi bi-plus-circle me-2 text-primary"></i>Create Incident</h4></div>
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="soc-card">
      <div class="soc-card-header">New Incident</div>
      <div class="soc-card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" name="title" class="form-control" required placeholder="Brief incident description"/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Severity</label>
              <select name="severity" class="form-select">
                {% for s in ['critical','high','medium','low'] %}
                <option value="{{ s }}">{{ s|capitalize }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Threat Type</label>
              <select name="threat_type" class="form-select">
                {% for t in ['brute_force','privilege_escalation','lateral_movement','persistence','web_attack','reconnaissance','defense_evasion','credential_access','other'] %}
                <option value="{{ t }}">{{ t|replace('_',' ')|title }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Source IP</label>
              <input type="text" name="source_ip" class="form-control" placeholder="192.168.1.100"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Target Asset</label>
              <input type="text" name="target_asset" class="form-control" placeholder="server01, 10.0.0.5"/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Detailed incident description..."></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Incident</button>
            <a href="{{ url_for('incidents.index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
